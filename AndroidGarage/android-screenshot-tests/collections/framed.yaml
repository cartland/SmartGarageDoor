    description: "Home tab — Dark"
  - image: history_tab_light.png
    description: "History tab — Light"
  - image: history_tab_dark.png
    description: "History tab — Dark"
  - image: settings_tab_light.png
    description: "Settings tab — Light"
  - image: settings_tab_dark.png
    description: "Settings tab — Dark"
  - image: door_history_light.png
    description: "Door history detail — Light"
  - image: door_history_dark.png
    description: "Door history detail — Dark"
