title: "Framed Screenshots"
# Pixel-bezel-wrapped screenshots used in README / docs. Source images are
# auto-generated from `scripts/framed-screenshots.txt` by frame-screenshot.py.
# `source: framed` tells the collection generator to resolve `image:` against
# `AndroidGarage/screenshots/framed/<basename>.png` instead of the raw
# screenshot-test reference directory.
source: framed
screenshots:
