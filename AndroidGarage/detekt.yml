build:
  maxIssues: 0

complexity:
  active: true
  TooManyFunctions:
    active: false
  LongMethod:
    active: false
  LongParameterList:
    active: false
  CyclomaticComplexMethod:
    active: false

exceptions:
  active: true
  SwallowedException:
    active: true
    ignoredExceptionTypes:
      - InterruptedException
      - NumberFormatException
      - ParseException
      - Exception
  TooGenericExceptionCaught:
    active: false

naming:
  active: true
  FunctionNaming:
    ignoreAnnotated:
      - Composable
  TopLevelPropertyNaming:
    active: false
  ConstructorParameterNaming:
    active: false
  MatchingDeclarationName:
    active: false

potential-bugs:
  active: true
  ImplicitDefaultLocale:
    active: false

style:
  active: true
  MagicNumber:
    active: false
  MaxLineLength:
    active: false
  ForbiddenComment:
    active: true
    comments:
      - reason: "Use TODO instead"
        value: "FIXME:"
      - reason: "Must be removed before merging"
        value: "STOPSHIP:"
  UnusedPrivateMember:
    active: false
  UnusedPrivateProperty:
    active: false
  ReturnCount:
    active: false
