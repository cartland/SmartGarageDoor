<?xml version="1.0" encoding="utf-8"?>
<!--
  Smart Garage Door - Play Store hi-res icon (512x512) source.
  Refined-green garage-door mark: cream slatted door + window row on the
  brand green (#466730). Full-bleed; Play applies its own rounded mask.
  Regenerate the PNGs with distribution/playstore/generate.sh.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#517539"/>
      <stop offset="1" stop-color="#3C5728"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- header / lintel bar -->
  <rect x="138" y="120" width="236" height="30" rx="9" fill="#F5F2E8"/>
  <!-- door panel -->
  <rect x="150" y="156" width="212" height="240" rx="16" fill="#F5F2E8"/>
  <!-- windows in top slat (knockout to brand green) -->
  <rect x="161" y="170" width="34" height="24" rx="6" fill="#466730"/>
  <rect x="213" y="170" width="34" height="24" rx="6" fill="#466730"/>
  <rect x="265" y="170" width="34" height="24" rx="6" fill="#466730"/>
  <rect x="317" y="170" width="34" height="24" rx="6" fill="#466730"/>
  <!-- slat divider lines -->
  <rect x="150" y="214" width="212" height="7" fill="#466730"/>
  <rect x="150" y="262" width="212" height="7" fill="#466730"/>
  <rect x="150" y="310" width="212" height="7" fill="#466730"/>
  <rect x="150" y="358" width="212" height="7" fill="#466730"/>
</svg>
