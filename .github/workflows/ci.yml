name: Android CI

# Pre-submit checks — runs on PRs only.
# Post-merge checks are in ci-post-merge.yml.

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
      - name: Check for Android changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "docs_only=false" >> $GITHUB_OUTPUT
            echo "workflow_dispatch: running all checks"
            exit 0
          fi

          BASE="origin/${{ github.base_ref }}"
          git fetch --depth=1 origin "${{ github.base_ref }}" 2>/dev/null || true

          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || echo "UNKNOWN")

          if [ "$CHANGED" = "UNKNOWN" ]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "docs_only=false" >> $GITHUB_OUTPUT
            echo "Could not determine changes, running all checks"
            exit 0
          fi

          # Docs-only fast path: skip CI when no change affects what CI verifies.
          # Docs = markdown anywhere, docs/ directories, .claude/ (skills/hooks/settings
          # affect dev tooling only, not shipped artifacts), LICENSE, .gitignore,
          # and Android release metadata (CHANGELOG.md matches *.md, whatsnew/ below).
          NON_DOCS=$(echo "$CHANGED" | grep -vE '^(.*\.md$|docs/|.*/docs/|\.claude/|LICENSE$|\.gitignore$|AndroidGarage/distribution/whatsnew/)' || true)
          if [ -z "$NON_DOCS" ] && [ -n "$CHANGED" ]; then
            echo "android=false" >> $GITHUB_OUTPUT
            echo "docs_only=true" >> $GITHUB_OUTPUT
            echo "Docs-only change — skipping Android CI. Changed files:"
            echo "$CHANGED"
            exit 0
          fi

          echo "docs_only=false" >> $GITHUB_OUTPUT

          if echo "$CHANGED" | grep -qE '^(AndroidGarage/|scripts/|\.github/(workflows|actions)/)'; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "Android files changed:"
            echo "$CHANGED" | grep -E '^(AndroidGarage/|scripts/|\.github/(workflows|actions)/)'
          else
            echo "android=false" >> $GITHUB_OUTPUT
            echo "No Android files changed. Changed files:"
            echo "$CHANGED"
          fi

  checks:
    name: Checks
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    uses: ./.github/workflows/ci-checks.yml
    with:
      android: ${{ needs.changes.outputs.android }}
    secrets:
      ENCRYPT_KEY: ${{ secrets.ENCRYPT_KEY }}
      SERVER_CONFIG_KEY: ${{ secrets.SERVER_CONFIG_KEY }}
      GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
      GARAGE_RELEASE_KEYSTORE_PWD: ${{ secrets.GARAGE_RELEASE_KEYSTORE_PWD }}
      GARAGE_RELEASE_KEY_PWD: ${{ secrets.GARAGE_RELEASE_KEY_PWD }}

  # Gate job — the ONLY required status check in branch protection.
  # Succeeds when all CI jobs pass OR when they're skipped (no Android changes).
  ci-complete:
    name: CI Complete
    if: always()
    needs: [checks]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Checks: ${{ needs.checks.result }}"

          if [[ "${{ needs.checks.result }}" == "failure" || \
                "${{ needs.checks.result }}" == "cancelled" ]]; then
            echo "::error::CI checks failed"
            exit 1
          fi

          echo "All CI checks passed (or skipped — no Android changes / docs-only)"
