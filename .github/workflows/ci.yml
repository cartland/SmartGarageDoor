name: Android CI

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
    steps:
      - uses: actions/checkout@v4
      - name: Check for Android changes
        id: filter
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "workflow_dispatch: running all checks"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ]; then
            BASE="${{ github.event.before }}"
          else
            BASE="origin/${{ github.base_ref }}"
            git fetch --depth=1 origin "${{ github.base_ref }}" 2>/dev/null || true
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || echo "UNKNOWN")

          if [ "$CHANGED" = "UNKNOWN" ]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "Could not determine changes, running all checks"
            exit 0
          fi

          if echo "$CHANGED" | grep -qE '^(AndroidGarage/|\.github/workflows/ci\.yml|\.github/actions/)'; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "Android files changed:"
            echo "$CHANGED" | grep -E '^(AndroidGarage/|\.github/workflows/ci\.yml|\.github/actions/)'
          else
            echo "android=false" >> $GITHUB_OUTPUT
            echo "No Android files changed. Changed files:"
            echo "$CHANGED"
          fi

  formatting:
    name: Formatting & Static Analysis
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
        with:
          encrypt-key: ${{ secrets.ENCRYPT_KEY }}
      - name: Run Spotless Check
        working-directory: AndroidGarage
        run: ./gradlew spotlessCheck
      - name: Run Detekt
        working-directory: AndroidGarage
        run: ./gradlew :androidApp:detekt
      - name: Run Android Lint
        working-directory: AndroidGarage
        run: ./gradlew :androidApp:lint
      - name: Compile Screenshot Tests
        working-directory: AndroidGarage
        run: ./gradlew :android-screenshot-tests:compileDebugScreenshotTestKotlin
      - name: Clean secrets
        if: always()
        working-directory: AndroidGarage
        run: ./release/clean-secrets.sh

  unit_tests:
    name: Unit Tests
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
        with:
          encrypt-key: ${{ secrets.ENCRYPT_KEY }}
      - name: Run Unit Tests
        working-directory: AndroidGarage
        env:
          SERVER_CONFIG_KEY: ${{ secrets.SERVER_CONFIG_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew test -PSERVER_CONFIG_KEY="$SERVER_CONFIG_KEY" -PGOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID"
      - name: Clean secrets
        if: always()
        working-directory: AndroidGarage
        run: ./release/clean-secrets.sh
      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: AndroidGarage/androidApp/build/reports/tests/

  build_debug:
    name: Build Debug APK
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
        with:
          encrypt-key: ${{ secrets.ENCRYPT_KEY }}
      - name: Build Debug
        working-directory: AndroidGarage
        env:
          SERVER_CONFIG_KEY: ${{ secrets.SERVER_CONFIG_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
        run: ./gradlew :androidApp:assembleDebug -PSERVER_CONFIG_KEY="$SERVER_CONFIG_KEY" -PGOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID"
      - name: Clean secrets
        if: always()
        working-directory: AndroidGarage
        run: ./release/clean-secrets.sh
      - name: Upload debug APK
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: debug-apk
          path: AndroidGarage/androidApp/build/outputs/apk/debug/

  build_release:
    name: Build Release AAB
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-android
        with:
          encrypt-key: ${{ secrets.ENCRYPT_KEY }}
      - name: Build Release AAB
        working-directory: AndroidGarage
        env:
          SERVER_CONFIG_KEY: ${{ secrets.SERVER_CONFIG_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GARAGE_RELEASE_KEYSTORE_PWD: ${{ secrets.GARAGE_RELEASE_KEYSTORE_PWD }}
          GARAGE_RELEASE_KEY_PWD: ${{ secrets.GARAGE_RELEASE_KEY_PWD }}
        run: ./gradlew :androidApp:bundleRelease -PSERVER_CONFIG_KEY="$SERVER_CONFIG_KEY" -PGOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID" -PGARAGE_RELEASE_KEYSTORE_PWD="$GARAGE_RELEASE_KEYSTORE_PWD" -PGARAGE_RELEASE_KEY_PWD="$GARAGE_RELEASE_KEY_PWD"
      - name: Clean secrets
        if: always()
        working-directory: AndroidGarage
        run: ./release/clean-secrets.sh
      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: release-aab
          path: AndroidGarage/androidApp/build/outputs/bundle/release/

  # Gate job — the ONLY required status check in branch protection.
  # Succeeds when all CI jobs pass OR when they're skipped (no Android changes).
  ci-complete:
    name: CI Complete
    if: always()
    needs: [formatting, unit_tests, build_debug, build_release]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Formatting: ${{ needs.formatting.result }}"
          echo "Unit Tests: ${{ needs.unit_tests.result }}"
          echo "Build Debug: ${{ needs.build_debug.result }}"
          echo "Build Release: ${{ needs.build_release.result }}"

          # Fail if any job failed or was cancelled
          if [[ "${{ needs.formatting.result }}" == "failure" || \
                "${{ needs.unit_tests.result }}" == "failure" || \
                "${{ needs.build_debug.result }}" == "failure" || \
                "${{ needs.build_release.result }}" == "failure" || \
                "${{ needs.formatting.result }}" == "cancelled" || \
                "${{ needs.unit_tests.result }}" == "cancelled" || \
                "${{ needs.build_debug.result }}" == "cancelled" || \
                "${{ needs.build_release.result }}" == "cancelled" ]]; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi

          echo "All CI checks passed (or skipped — no Android changes)"
  # Deployment: .github/workflows/release-android.yml (triggered by android/N tags)
