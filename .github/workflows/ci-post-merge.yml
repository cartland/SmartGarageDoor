name: Post-Merge CI

# Post-submit checks — runs on push to main only.
# Re-runs all shared checks (catches merge-induced breakage)
# plus instrumented tests (device/emulator only).
# Failures auto-create GitHub issues; fixes auto-close them.

on:
  push:
    branches: [ "main" ]

permissions:
  contents: read
  issues: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      android: ${{ steps.filter.outputs.android }}
      docs_only: ${{ steps.filter.outputs.docs_only }}
    steps:
      - uses: actions/checkout@v5
      - name: Check for Android changes
        id: filter
        run: |
          BASE="${{ github.event.before }}"
          CHANGED=$(git diff --name-only "$BASE" HEAD 2>/dev/null || echo "UNKNOWN")

          if [ "$CHANGED" = "UNKNOWN" ]; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "docs_only=false" >> $GITHUB_OUTPUT
            echo "Could not determine changes, running all checks"
            exit 0
          fi

          # Docs-only fast path — see ci.yml for rationale.
          NON_DOCS=$(echo "$CHANGED" | grep -vE '^(.*\.md$|docs/|.*/docs/|\.claude/|LICENSE$|\.gitignore$|AndroidGarage/distribution/whatsnew/)' || true)
          if [ -z "$NON_DOCS" ] && [ -n "$CHANGED" ]; then
            echo "android=false" >> $GITHUB_OUTPUT
            echo "docs_only=true" >> $GITHUB_OUTPUT
            echo "Docs-only change — skipping Android post-merge CI. Changed files:"
            echo "$CHANGED"
            exit 0
          fi

          echo "docs_only=false" >> $GITHUB_OUTPUT

          if echo "$CHANGED" | grep -qE '^(AndroidGarage/|scripts/|\.github/(workflows|actions)/)'; then
            echo "android=true" >> $GITHUB_OUTPUT
            echo "Android files changed:"
            echo "$CHANGED" | grep -E '^(AndroidGarage/|scripts/|\.github/(workflows|actions)/)'
          else
            echo "android=false" >> $GITHUB_OUTPUT
            echo "No Android files changed. Changed files:"
            echo "$CHANGED"
          fi

  # Shared checks (same as PR CI)
  checks:
    name: Checks
    needs: changes
    if: needs.changes.outputs.docs_only != 'true'
    uses: ./.github/workflows/ci-checks.yml
    with:
      android: ${{ needs.changes.outputs.android }}
    secrets:
      ENCRYPT_KEY: ${{ secrets.ENCRYPT_KEY }}
      SERVER_CONFIG_KEY: ${{ secrets.SERVER_CONFIG_KEY }}
      GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
      GARAGE_RELEASE_KEYSTORE_PWD: ${{ secrets.GARAGE_RELEASE_KEYSTORE_PWD }}
      GARAGE_RELEASE_KEY_PWD: ${{ secrets.GARAGE_RELEASE_KEY_PWD }}

  # Instrumented tests — post-merge only
  instrumented-tests:
    name: Instrumented Tests
    needs: changes
    if: needs.changes.outputs.android == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-android
        with:
          encrypt-key: ${{ secrets.ENCRYPT_KEY }}

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        working-directory: AndroidGarage
        run: ./gradlew pixel6Api34DebugAndroidTest

      - name: Clean secrets
        if: always()
        working-directory: AndroidGarage
        run: ./release/clean-secrets.sh

  # Gate job — single check-run name for release script to verify.
  post-merge-complete:
    name: Post-Merge Complete
    if: always()
    needs: [checks, instrumented-tests]
    runs-on: ubuntu-latest
    steps:
      - name: Check results
        run: |
          echo "Checks: ${{ needs.checks.result }}"
          echo "Instrumented: ${{ needs.instrumented-tests.result }}"

          if [[ "${{ needs.checks.result }}" == "failure" || \
                "${{ needs.instrumented-tests.result }}" == "failure" || \
                "${{ needs.checks.result }}" == "cancelled" || \
                "${{ needs.instrumented-tests.result }}" == "cancelled" ]]; then
            echo "::error::Post-merge CI failed"
            exit 1
          fi

          echo "All post-merge checks passed (or skipped — no Android changes / docs-only)"

  # Track post-merge failures via a single GitHub issue
  track-failure:
    name: Track Post-Merge Failure
    if: always() && needs.changes.outputs.android == 'true'
    needs: [changes, checks, instrumented-tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Determine overall result
        id: result
        run: |
          CHECKS="${{ needs.checks.result }}"
          INSTRUMENTED="${{ needs.instrumented-tests.result }}"
          echo "checks=$CHECKS" >> $GITHUB_OUTPUT
          echo "instrumented=$INSTRUMENTED" >> $GITHUB_OUTPUT
          if [[ "$CHECKS" == "failure" || "$INSTRUMENTED" == "failure" ]]; then
            echo "overall=failure" >> $GITHUB_OUTPUT
          else
            echo "overall=success" >> $GITHUB_OUTPUT
          fi
      - uses: ./.github/actions/ci-failure-tracker
        with:
          label: ci-failure/post-merge
          result: ${{ steps.result.outputs.overall }}
          workflow-name: "Post-Merge CI (checks: ${{ steps.result.outputs.checks }}, instrumented: ${{ steps.result.outputs.instrumented }})"
