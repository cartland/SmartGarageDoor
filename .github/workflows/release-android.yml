name: Android Release

# Triggered by android/N tags pushed by scripts/release-android.sh
# Deploys to internal track only — never production.
# To retry a failed release, use "Re-run all jobs" in the Actions UI.
on:
  push:
    tags:
      - 'android/[0-9]*'

permissions:
  contents: read
  issues: write

jobs:
  release:
    name: Android Release Build and Deploy to Internal
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Validate tag format
        id: validate
        run: |
          REF="${GITHUB_REF}"
          if [[ ! "$REF" =~ ^refs/tags/ ]]; then
            echo "::error::This workflow must be run on a tag."
            exit 1
          fi

          TAG="${REF#refs/tags/}"
          if [[ ! "$TAG" =~ ^android/[0-9]+$ ]]; then
            echo "::error::Tag must match 'android/N' pattern, got: $TAG"
            exit 1
          fi

          VERSION="${TAG#android/}"
          echo "version_code=$VERSION" >> $GITHUB_OUTPUT
          echo "Validated: tag=$TAG, versionCode=$VERSION"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0 # full history so the mainline check below can walk ancestry

      # Server-side re-assertion that this is a mainline commit. The release
      # script already refuses to tag anything off `main` locally, and a
      # Claude hook blocks pushing a tag ref directly -- but neither of those
      # is enforced here, on the runner, which is the one place this
      # workflow can't be argued with. This closes that gap independent of
      # who cut the tag or how the ref was pushed.
      - name: Verify tagged commit is on main
        run: |
          # Fetch into FETCH_HEAD rather than relying on refs/remotes/origin/main
          # existing -- actions/checkout's configured refspec for a tag-triggered
          # checkout is scoped to the tag, not a full branch mirror, so
          # origin/main may not exist locally even after this fetch.
          git fetch origin main --quiet
          if ! git merge-base --is-ancestor "$GITHUB_SHA" FETCH_HEAD; then
            echo "::error::Tag ${GITHUB_REF_NAME} points to commit $GITHUB_SHA, which is not reachable from origin/main. Refusing to release a commit that hasn't gone through the required main-branch checks."
            exit 1
          fi
          echo "Verified: $GITHUB_SHA is on origin/main."

      - uses: ./.github/actions/setup-android
        with:
          encrypt-key: ${{ secrets.ENCRYPT_KEY }}

      - name: Build Release AAB
        working-directory: MobileGarage
        env:
          SERVER_CONFIG_KEY: ${{ secrets.SERVER_CONFIG_KEY }}
          GOOGLE_WEB_CLIENT_ID: ${{ secrets.GOOGLE_WEB_CLIENT_ID }}
          GARAGE_RELEASE_KEYSTORE_PWD: ${{ secrets.GARAGE_RELEASE_KEYSTORE_PWD }}
          GARAGE_RELEASE_KEY_PWD: ${{ secrets.GARAGE_RELEASE_KEY_PWD }}
        run: ./gradlew :androidApp:bundleRelease -PVERSION_CODE=${{ steps.validate.outputs.version_code }} -PSERVER_CONFIG_KEY="$SERVER_CONFIG_KEY" -PGOOGLE_WEB_CLIENT_ID="$GOOGLE_WEB_CLIENT_ID" -PGARAGE_RELEASE_KEYSTORE_PWD="$GARAGE_RELEASE_KEYSTORE_PWD" -PGARAGE_RELEASE_KEY_PWD="$GARAGE_RELEASE_KEY_PWD"

      - name: Clean secrets
        if: always()
        working-directory: MobileGarage
        run: ./release/clean-secrets.sh

      - name: Rename AAB with version code
        run: |
          VERSION_CODE="${{ steps.validate.outputs.version_code }}"
          AAB_DIR="MobileGarage/androidApp/build/outputs/bundle/release"
          for f in "$AAB_DIR"/*.aab; do
            base=$(basename "$f" .aab)
            mv "$f" "$AAB_DIR/${base}-${VERSION_CODE}.aab"
          done
          echo "Renamed AAB files:"
          ls "$AAB_DIR"/*.aab

      # Short retention because the signed AAB embeds BuildConfig.SERVER_CONFIG_KEY
      # and is publicly fetchable for the retention window via the GitHub Actions
      # artifacts API on a public repo. Play Store is the source of truth for the
      # binary; this 1-day artifact exists only for same-day release-debugging.
      - name: Upload release AAB artifact
        uses: actions/upload-artifact@v6
        with:
          name: release-aab-${{ steps.validate.outputs.version_code }}
          path: MobileGarage/androidApp/build/outputs/bundle/release/
          retention-days: 1

      - name: Deploy to Google Play (Internal Track)
        # Pinned to the v1.1.5 commit SHA (audit M4): a third-party action on a
        # moving tag could be swapped underneath us; this one handles the Play
        # service-account credential. Bump by resolving the new tag's SHA:
        #   gh api repos/r0adkll/upload-google-play/git/ref/tags/<tag> --jq .object.sha
        uses: r0adkll/upload-google-play@e738b9dd8f2476ea806d921b64aacd24f34515a5 # v1.1.5
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.chriscartland.garage
          releaseFiles: MobileGarage/androidApp/build/outputs/bundle/release/*.aab
          tracks: internal
          whatsNewDirectory: MobileGarage/distribution/whatsnew

      - name: Release summary
        run: |
          VERSION_CODE="${{ steps.validate.outputs.version_code }}"
          TAG="android/$VERSION_CODE"
          echo "::notice title=Android Release::Released $TAG to Play Store internal track (versionCode=$VERSION_CODE, package=com.chriscartland.garage)"

  # Track release failures via a single GitHub issue (auto-create on failure,
  # auto-close on the next successful release). Mirrors the post-merge CI pattern.
  track-failure:
    name: Track Android Release Failure
    if: always()
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/ci-failure-tracker
        with:
          label: release-failure/android
          result: ${{ needs.release.result == 'success' && 'success' || 'failure' }}
          workflow-name: "Android Release (tag: ${{ github.ref_name }})"
