# Dependabot configuration — automated dependency-update PRs.
#
# Closes security audit finding M14 (2026-05-14): CI ran `npm audit` warn-only
# with no automated upgrade flow.
#
# POSTURE: minor/patch only. Major bumps are IGNORED here on purpose — the first
# run (2026-06-29) opened a flood that included several majors (agp 8->9,
# spotless 7->8, firebase-functions 6->7, firebase-admin 13->14, compose-bom,
# action majors), each of which needs the deliberate sequencing playbook in
# docs/DEPENDENCY_UPGRADES.md (and the "stay on Node 22" / kotlin-inject 0.8.0
# pins), not a drop-in auto-PR. Take majors by hand when you choose. Minor/patch
# bumps are grouped per ecosystem and auto-merge once CI is green.
#
# The Kotlin/AGP/KSP/Room/kotlin-inject/SKIE/serialization toolchain is ALSO
# ignored in the gradle ecosystem below (not just its majors): these are
# high-impact even at a semver-MINOR bump and are Bucket C (hand-managed, serial,
# release-proof). Exemplar: the first gradle group (#1004) bundled Kotlin
# 2.1.20 -> 2.4.0, which turned `jvmTarget: String` into a hard error and broke
# :buildSrc for all 58 grouped updates. See the per-ecosystem `ignore` for the list.
#
# NOTE (Android-side CI): GitHub withholds repo Actions secrets from
# Dependabot-triggered runs, so the google-services.json decrypt no-ops. CI is
# made Dependabot-resilient separately (placeholder google-services.json +
# skipping the release-AAB/signing job on Dependabot runs) so gradle/actions
# minor/patch PRs can still pass the gate. npm PRs only trigger Firebase CI,
# which needs no Android secrets.
#
# open-pull-requests-limit is low (3) so a wave never re-floods the backlog (the
# check-pr-backlog hook warns at 5, blocks at 10).
version: 2
updates:
  # Firebase Cloud Functions (TypeScript) — package.json lives in FirebaseServer/.
  - package-ecosystem: npm
    directory: /FirebaseServer
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      firebase-server-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # Android app + KMP modules — Gradle reads gradle/libs.versions.toml and the
  # build.gradle.kts files under AndroidGarage/.
  - package-ecosystem: gradle
    directory: /AndroidGarage
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      android-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
      # Kotlin / AGP / KSP toolchain + KMP-bridge + wire-contract deps: HIGH-IMPACT
      # even at a semver-MINOR bump, so they must not ride the auto android-minor-patch
      # group. Exemplar: Dependabot's first gradle group (#1004) bumped Kotlin
      # 2.1.20 -> 2.4.0, which turned the deprecated `jvmTarget: String` Gradle DSL
      # into a hard error and broke `:buildSrc:compileKotlin` for the whole group.
      # These are Bucket C in docs/DEPENDENCY_UPGRADES.md — take by hand, serial,
      # with a real `android/N` release as proof (and they're version-pinned for a
      # reason: kotlin-inject 0.8.0 and the Kotlin<->KSP<->SKIE version lockstep).
      #
      # Patterns must match the EXACT name Dependabot prints in the PR body, which
      # is not always the obvious coordinate. #1006's first attempt missed two
      # (#1008 still carried them): Room is named bare `androidx.room` (a colon
      # pattern `androidx.room:*` did NOT match), and the `agp` version is tracked
      # under the plugin id `com.android.kotlin.multiplatform.library` (not
      # `com.android.application` / `com.android.tools.build`). When refining,
      # read the real names from the open group PR's body, not the catalog alias.
      - dependency-name: "org.jetbrains.kotlin:*"
      - dependency-name: "org.jetbrains.kotlin.*"
      - dependency-name: "com.google.devtools.ksp*"
      - dependency-name: "com.android*"                 # AGP (incl. com.android.kotlin.multiplatform.library)
      - dependency-name: "androidx.room*"               # bare `androidx.room`, no colon
      - dependency-name: "me.tatarka.inject:*"
      - dependency-name: "co.touchlab.skie*"
      - dependency-name: "org.jetbrains.kotlinx:kotlinx-serialization*"
      - dependency-name: "io.ktor:*"                    # HTTP client — wire-contract highest-risk (JSON shape drift)
      # AGP-coupled androidx: these gate on `checkDebugAarMetadata` ("requires
      # Android Gradle plugin 9.1.0 or higher") but AGP is pinned at 8.10.1 above,
      # so they can't auto-bump — they poison the whole group red (exemplar: #1010,
      # core 1.19 / lifecycle 2.11 / navigation3 1.2.0-alpha each demand AGP 9.1).
      # Hold them with AGP; they move together by hand when the toolchain moves.
      # The decoupled deps (spotless, detekt, compose-bom, mockito, kermit, junit,
      # screenshot, activity, datastore, sqlite, test libs) still auto-merge.
      - dependency-name: "androidx.core*"
      - dependency-name: "androidx.lifecycle*"
      - dependency-name: "androidx.navigation3*"
      - dependency-name: "org.jetbrains.androidx*"      # KMP nav3 / lifecycle variants (same AGP-coupled wave)

  # GitHub Actions used by the workflows in .github/workflows/. Addresses the
  # low/informational finding that several actions are pinned to floating major
  # tags rather than commit SHAs.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    groups:
      github-actions-minor-patch:
        update-types:
          - minor
          - patch
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
