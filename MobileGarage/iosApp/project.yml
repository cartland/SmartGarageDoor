# XcodeGen spec — source of truth for GarageControl.xcodeproj.
#
# The .xcodeproj is GENERATED, not committed (see .gitignore). Regenerate
# after editing this file or adding/removing Swift sources:
#
#     brew install xcodegen        # one-time
#     cd MobileGarage/iosApp && xcodegen generate
#
# Build for the simulator from the CLI:
#
#     cd MobileGarage/iosApp && xcodegen generate
#     xcodebuild -project GarageControl.xcodeproj -scheme GarageControl \
#       -sdk iphonesimulator -destination 'generic/platform=iOS Simulator' \
#       CODE_SIGNING_ALLOWED=NO build
#
# The Kotlin `shared.framework` is produced by a pre-build Run Script that
# invokes `:iosFramework:embedAndSignAppleFrameworkForXcode` (mirrors
# battery-butler's wiring). FRAMEWORK_SEARCH_PATHS points at the task's
# output dir; the task also embeds + signs the framework into the app.

name: GarageControl
options:
  bundleIdPrefix: com.chriscartland.garage
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    # Kotlin/Native types lack Swift `Sendable` info; keep strict concurrency
    # at `minimal` and `@preconcurrency import shared` where needed.
    SWIFT_STRICT_CONCURRENCY: minimal
    # KMP gradle Run Script writes outside the Xcode sandbox.
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: "11.0.0"
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "7.1.0"
  SnapshotTesting:
    url: https://github.com/pointfreeco/swift-snapshot-testing
    from: "1.18.0"
  Prefire:
    url: https://github.com/BarredEwe/Prefire
    from: "5.6.0"

targets:
  GarageControl:
    type: application
    platform: iOS
    sources:
      - path: GarageControl
      - path: Core
      - path: Features
    dependencies:
      - package: Firebase
        product: FirebaseAuth
      - package: Firebase
        product: FirebaseMessaging
      - package: GoogleSignIn
        product: GoogleSignIn
    configFiles:
      Debug: Secrets.xcconfig
      Release: Secrets.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.chriscartland.garage
        # Code signing. Team ID is not a secret (it appears in every app's
        # provisioning), so it's committed. Automatic signing lets Xcode manage
        # the cert + provisioning profile for the App ID. CI builds pass
        # CODE_SIGNING_ALLOWED=NO, which makes these inert for the simulator build.
        DEVELOPMENT_TEAM: 4EFTFGDT4G
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_ENTITLEMENTS: GarageControl/GarageControl.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: GarageControl/Info.plist
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Garage
        INFOPLIST_KEY_UISupportedInterfaceOrientations: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1,2"
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../iosFramework/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - shared
      configs:
        # Drives `aps-environment` in GarageControl.entitlements. Debug device builds
        # use the development APNs sandbox; Release (archive → TestFlight / App
        # Store) uses production APNs.
        Debug:
          APS_ENVIRONMENT: development
        Release:
          APS_ENVIRONMENT: production
    preBuildScripts:
      - name: "Build Kotlin shared.framework (embedAndSign)"
        basedOnDependencyAnalysis: false
        script: |
          if [ "YES" = "$OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED" ]; then
            echo "Skipping Gradle build (OVERRIDE_KOTLIN_BUILD_IDE_SUPPORTED=YES)"
            exit 0
          fi
          cd "$SRCROOT/.."
          ./gradlew :iosFramework:embedAndSignAppleFrameworkForXcode

  # Snapshot-test target. Renders SwiftUI #Previews to committed reference PNGs
  # via Prefire (auto-generates tests from #Preview) + swift-snapshot-testing.
  # Posture is "regenerate, don't assert" — driven by
  # scripts/generate-ios-screenshots.sh; not a gating CI check.
  GarageControlSnapshotTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      # The single build input is the generated PreviewTests file. It is NOT
      # committed (gitignored) and may be absent on a fresh checkout, so it is
      # listed `optional: true` — XcodeGen still references it in Compile
      # Sources, and the pre-build script below regenerates it before compiling.
      # The recorded PNGs + *.md are deliberately NOT target members (they are
      # written to disk by swift-snapshot-testing via #filePath, and bundling
      # them as resources would break the build after the script clears
      # __Snapshots__).
      - path: SnapshotTests/PreviewTests.generated.swift
        optional: true
    dependencies:
      - target: GarageControl
      - package: SnapshotTesting
        product: SnapshotTesting
      - package: Prefire
        product: Prefire
    preBuildScripts:
      # Regenerate PreviewTests.generated.swift from the #Preview macros so the
      # test target builds and runs in Xcode directly (Cmd-U / build-for-testing)
      # WITHOUT first running scripts/generate-ios-screenshots.sh. Mirrors the
      # CLI step in that script. Only runs when the test target is built (the app
      # target and gating iOS CI `xcodebuild build` never trigger it).
      - name: "Generate Prefire snapshot tests"
        basedOnDependencyAnalysis: false
        # Declaring the generated file as an output tells the build system the
        # script produces it, so the Compile Sources phase that consumes it
        # doesn't fail its pre-flight "input file cannot be found" check on a
        # fresh checkout (the file is gitignored / may be absent at build start).
        outputFiles:
          - $(SRCROOT)/SnapshotTests/PreviewTests.generated.swift
        script: |
          DD_ROOT="${BUILD_DIR%%/Build/*}"
          PREFIRE="$(/usr/bin/find "$DD_ROOT/SourcePackages/checkouts/Prefire" -type f -name prefire -path '*Binaries*bin*' 2>/dev/null | head -1)"
          if [ -z "$PREFIRE" ]; then
            echo "warning: Prefire CLI not found under $DD_ROOT/SourcePackages — PreviewTests not regenerated"
            exit 0
          fi
          # --cache-base-path keeps Prefire's parse cache in the build dir (not
          # the source tree); it is cleaned with DerivedData, so the cache and
          # the generated output can never go stale relative to each other.
          # Prefire writes the output only when its content changes, so this
          # phase running every build does not cause recompile churn.
          "$PREFIRE" tests "$SRCROOT/Features" "$SRCROOT/Core" \
            --target GarageControl --test-target GarageControlSnapshotTests \
            --config "$SRCROOT/.prefire.yml" --output "$SRCROOT/SnapshotTests" \
            --cache-base-path "$DERIVED_FILE_DIR"
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.chriscartland.garage.SnapshotTests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/GarageControl.app/GarageControl"
        BUNDLE_LOADER: "$(TEST_HOST)"
        # `import shared` needs the Kotlin framework module on the search path,
        # same as the app target. Symbols resolve against the host at runtime.
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../iosFramework/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)

schemes:
  GarageControl:
    build:
      targets:
        GarageControl: all
        GarageControlSnapshotTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - GarageControlSnapshotTests
